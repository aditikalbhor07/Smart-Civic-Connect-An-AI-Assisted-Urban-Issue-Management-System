<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>
Track Complaint
</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:

linear-gradient(
135deg,
#eef3ff,
#dfe8ff
);

padding:40px;

}



.box{

max-width:1100px;

margin:auto;

background:white;

padding:50px;

border-radius:30px;

box-shadow:
0 20px 50px rgba(
0,
0,
0,
0.1
);

}



.title{

text-align:center;

margin-bottom:40px;

color:#0B57D0;

}



.search{

display:grid;

grid-template-columns:
3fr 1fr;

gap:20px;

}



input{

padding:18px;

border-radius:15px;

border:1px solid #ddd;

}



button{

padding:18px;

border:none;

border-radius:15px;

background:#0B57D0;

color:white;

}



.status{

margin-top:40px;

display:grid;

grid-template-columns:
repeat(
4,
1fr
);

gap:20px;

}



.card{

padding:30px;

border-radius:20px;

color:white;

}



.blue{

background:#0B57D0;

}

.orange{

background:#ff9800;

}

.green{

background:#22a55d;

}

.red{

background:#f44336;

}



.progress{

height:25px;

margin-top:30px;

}



.details{

margin-top:40px;

background:#f7f9ff;

padding:30px;

border-radius:20px;

}



.timeline{

margin-top:30px;

}



.step{

padding:20px;

margin:20px 0;

background:white;

border-left:8px solid #0B57D0;

}



@media(max-width:900px){

.search{

grid-template-columns:1fr;

}

.status{

grid-template-columns:1fr;

}

}

</style>

</head>


<body>


<div class="box">

<h1 class="title">

📍 Track Complaint

</h1>



<div class="search">

<input
placeholder="Enter Complaint ID">

<button>

Track

</button>

</div>




<div class="status">


<div class="card blue">

Complaint ID

<h2>

#1001

</h2>

</div>



<div class="card orange">

Status

<h2>

Pending

</h2>

</div>



<div class="card green">

Department

<h2>

Road

</h2>

</div>



<div class="card red">

Priority

<h2>

High

</h2>

</div>


</div>





<div class="progress">

<div
class="progress-bar progress-bar-striped progress-bar-animated"

style="width:70%">

70%

</div>

</div>





<div class="details">

<h2>

Complaint Details

</h2>

<br>

Issue:
Road damage

<br><br>

Location:
Pune

<br><br>

Registered:
Today

</div>





<div class="timeline">

<h2>

Timeline

</h2>



<div class="step">

✅ Complaint Registered

</div>



<div class="step">

✅ Assigned To Department

</div>



<div class="step">

🛠 Processing

</div>



<div class="step">

⏳ Resolution Pending

</div>


</div>


</div>

</body>

</html>
