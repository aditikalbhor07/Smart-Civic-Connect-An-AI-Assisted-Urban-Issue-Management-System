<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>

Admin Dashboard

</title>


<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:#eef3ff;

}



/* SIDEBAR */

.sidebar{

position:fixed;

left:0;

top:0;

width:300px;

height:100vh;

background:

linear-gradient(
180deg,
#07142c,
#0B57D0
);

padding:30px;

color:white;

}



.logo{

font-size:34px;

text-align:center;

margin-bottom:40px;

}



.menu{

display:flex;

flex-direction:column;

gap:15px;

}



.item{

padding:18px;

border-radius:15px;

font-size:22px;

cursor:pointer;

}



.item:hover{

background:

rgba(
255,
255,
255,
0.12
);

}



.active{

background:

rgba(
255,
255,
255,
0.2
);

}



/* CONTENT */

.content{

margin-left:300px;

padding:40px;

}



.cards{

display:grid;

grid-template-columns:
repeat(
4,
1fr
);

gap:20px;

}



.card1{

background:white;

padding:30px;

border-radius:20px;

}



.number{

font-size:50px;

font-weight:bold;

}



.table-box{

margin-top:40px;

background:white;

padding:30px;

border-radius:20px;

}



.btn1{

padding:12px 22px;

background:#0B57D0;

color:white;

border:none;

border-radius:10px;

}



@media(max-width:900px){

.sidebar{

position:relative;

width:100%;

height:auto;

}

.content{

margin-left:0;

}

.cards{

grid-template-columns:1fr;

}

}

</style>

</head>



<body>



<div class="sidebar">

<div class="logo">

🏙 Admin

</div>



<div class="menu">

<div class="item active">

🏠 Dashboard

</div>


<div class="item">

📝 Complaints

</div>


<div class="item">

👥 Users

</div>


<div class="item">

📊 Analytics

</div>


<div class="item">

⚙ Settings

</div>


<div class="item">

🚪 Logout

</div>


</div>

</div>




<div class="content">


<h1>

Admin Panel

</h1>


<br>



<div class="cards">


<div class="card1">

<div class="number">

145

</div>

Total Complaints

</div>



<div class="card1">

<div class="number">

25

</div>

Pending

</div>



<div class="card1">

<div class="number">

110

</div>

Resolved

</div>



<div class="card1">

<div class="number">

200

</div>

Users

</div>


</div>





<div class="table-box">

<h2>

Recent Complaints

</h2>


<br>


<table
class="table">


<tr>

<th>ID</th>

<th>User</th>

<th>Issue</th>

<th>Status</th>

<th>Action</th>

</tr>



<tr>

<td>1001</td>

<td>Citizen</td>

<td>Road Issue</td>

<td>Pending</td>

<td>

<button class="btn1">

Resolve

</button>

</td>

</tr>



<tr>

<td>1002</td>

<td>Citizen</td>

<td>Water Issue</td>

<td>Resolved</td>

<td>

<button class="btn1">

View

</button>

</td>

</tr>



<tr>

<td>1003</td>

<td>Citizen</td>

<td>Electricity</td>

<td>Processing</td>

<td>

<button class="btn1">

Update

</button>

</td>

</tr>


</table>


</div>



</div>

</body>

</html>
