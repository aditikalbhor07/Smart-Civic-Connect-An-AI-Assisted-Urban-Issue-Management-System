<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Smart Civic Connect | Login
</title>


<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">


<link
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:

linear-gradient(
135deg,
#07142c,
#0B57D0,
#5B9CFF
);

padding:30px;

}


.container-box{

width:1100px;

background:white;

border-radius:35px;

overflow:hidden;

display:flex;

box-shadow:
0 20px 60px rgba(
0,
0,
0,
0.2
);

}



.left{

flex:1;

padding:70px;

background:

linear-gradient(
135deg,
#07142c,
#0B57D0
);

color:white;

display:flex;

flex-direction:column;

justify-content:center;

}



.left h1{

font-size:60px;

margin-bottom:20px;

}



.left p{

font-size:20px;

line-height:1.7;

}



.right{

flex:1;

padding:70px;

}



.logo{

text-align:center;

font-size:70px;

}



.title{

text-align:center;

margin-bottom:30px;

}



.input-box{

margin-bottom:20px;

position:relative;

}



.input-box input{

width:100%;

padding:18px;

border-radius:16px;

border:1px solid #ddd;

}



.eye{

position:absolute;

right:20px;

top:20px;

cursor:pointer;

}



.row1{

display:flex;

justify-content:space-between;

margin-bottom:25px;

}



.btn-login{

width:100%;

padding:18px;

border:none;

border-radius:16px;

background:#0B57D0;

color:white;

font-size:20px;

}



.social{

display:grid;

grid-template-columns:1fr 1fr;

gap:15px;

margin-top:20px;

}



.social button{

padding:16px;

border:none;

border-radius:16px;

}



.footer{

margin-top:30px;

text-align:center;

}



.footer a{

text-decoration:none;

}



@media(max-width:900px){

.container-box{

flex-direction:column;

}

.left{

padding:40px;

}

.right{

padding:40px;

}

.left h1{

font-size:40px;

}

}

</style>

</head>


<body>


<div class="container-box">


<div class="left">

<h1>

Welcome Back

</h1>

<p>

Smart Civic Connect

AI Based Urban Issue Management

</p>

<br>

<ul>

<li>Complaint Reporting</li>

<li>Live Tracking</li>

<li>Analytics</li>

<li>Citizen Dashboard</li>

</ul>

</div>





<div class="right">


<div class="logo">

🏙

</div>


<h2 class="title">

Sign In

</h2>



<form>


<div class="input-box">

<input
type="email"

placeholder="Enter Email"

required>

</div>




<div class="input-box">

<input
id="pass"

type="password"

placeholder="Password"

required>


<span
class="eye"

onclick="togglePass()">

👁

</span>

</div>




<div class="row1">

<label>

<input
type="checkbox">

Remember Me

</label>


<a href="#">

Forgot Password?

</a>


</div>




<button
class="btn-login">

Sign In

</button>




<div class="social">


<button>

Google

</button>


<button>

Apple

</button>


</div>




<div class="footer">

No Account?

<a
href="/register">

Register

</a>

</div>


</form>


</div>


</div>



<script>

function togglePass(){

let x=

document
.getElementById(
"pass"
)

if(

x.type==="password"

)

x.type="text"

else

x.type="password"

}

</script>

</body>

</html>
