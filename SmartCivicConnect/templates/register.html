<!DOCTYPE html>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Smart Civic Connect | Register
</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:

linear-gradient(

#07142c,

#5B9CFF
);

}



.register-box{

box-shadow:

.logo{

}



.title{

}

}



.input-box{

.input-box input,

.bottom{

</div>

<input

<br>
