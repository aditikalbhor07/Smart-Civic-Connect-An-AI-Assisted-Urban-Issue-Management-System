
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Report Issue

</title>


<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:

linear-gradient(
135deg,
#eef3ff,
#dce7ff
);

padding:40px;

}



.container1{

max-width:1000px;

margin:auto;

background:white;

padding:50px;

border-radius:30px;

box-shadow:
0 20px 50px rgba(
0,
0,
0,
0.1
);

}



h1{

text-align:center;

margin-bottom:40px;

color:#0B57D0;

}



.grid{

display:grid;

grid-template-columns:
1fr 1fr;

gap:20px;

}



input,
select,
textarea{

width:100%;

padding:18px;

border-radius:14px;

border:1px solid #ddd;

margin-top:10px;

}



textarea{

height:180px;

}



.upload{

padding:30px;

border:2px dashed #0B57D0;

text-align:center;

border-radius:20px;

}



.btn1{

width:100%;

padding:18px;

margin-top:30px;

border:none;

border-radius:14px;

background:#0B57D0;

color:white;

font-size:20px;

}



@media(max-width:900px){

.grid{

grid-template-columns:1fr;

}

.container1{

padding:30px;

}

}

</style>

</head>



<body>


<div class="container1">

<h1>

📝 Register Complaint

</h1>



<form method="POST">

<div class="grid">


<div>

<label>

Citizen Name

</label>

<input
name="name"
placeholder="Enter Name">

</div>




<div>

<label>

Issue Category

</label>

<select
name="category">

<option>

Road Issue

</option>

<option>

Electricity Issue

</option>

<option>

Water Issue

</option>

<option>

Garbage Issue

</option>

<option>

Street Light

</option>

</select>

</div>



<div>

<label>

Location

</label>

<input
name="location"
placeholder="Enter Location">

</div>




<div>

<label>

Priority

</label>

<select
name="priority">

<option>

Low

</option>

<option>

Medium

</option>

<option>

High

</option>

<option>

Emergency

</option>

</select>

</div>


</div>




<br>


<label>

Issue Description

</label>

<textarea
name="description">

</textarea>




<br>
<br>



<div class="upload">

📷 Upload Issue Image

<br><br>

<input
type="file">

</div>




<button
class="btn1">

Submit Complaint

</button>


</form>


</div>

</body>

</html>
